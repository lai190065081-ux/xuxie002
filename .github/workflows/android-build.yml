name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. 设置 Node.js 环境并安装 Web 端依赖
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies & Build Web Project
        run: |
          npm install
          npm run build

      # 3. 设置 Java 环境（Capacitor 安卓打包必需）
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      # 4. 设置 Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 5. 同步 Capacitor 代码到安卓原生工程
      - name: Capacitor Sync
        run: |
          npx cap add android || true
          npx cap sync android

      # 6. 自动更新版本号 (package.json 及 Android Gradle)
      - name: Auto Update Version Numbers
        run: |
          echo "Updating package.json version..."
          npm version 1.0.${{ github.run_number }} --no-git-tag-version --allow-same-version || true

          if [ -f "android/app/build.gradle" ]; then
            echo "Updating android/app/build.gradle Version Code and Name..."
            sed -i "s/versionCode [0-9]*/versionCode ${{ github.run_number }}/g" android/app/build.gradle
            sed -i 's/versionName "[^"]*"/versionName "1.0.${{ github.run_number }}"/g' android/app/build.gradle
            echo "Gradle file contents for versioning:"
            grep -E "versionCode|versionName" android/app/build.gradle || true
          else
            echo "Warning: android/app/build.gradle not found!"
          fi

      # 7. 赋予 Gradle 执行权限并编译 Debug APK
      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      # 8. 现场动态生成一个固定的 KeyStore 并对 APK 进行完整签名
      - name: Generate KeyStore and Sign APK
        run: |
          echo "Generating KeyStore file on the fly..."
          keytool -genkey -v \
            -keystore auto-release.jks \
            -alias novel_alias \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass novel_secure_password_2026 \
            -keypass novel_secure_password_2026 \
            -dname "CN=Novel App, OU=Development, O=Self, L=Anywhere, S=Anywhere, C=CN"

          echo "Locating Android SDK apksigner utility..."
          APKSIGNER_PATH=$(find $ANDROID_HOME/build-tools -name apksigner | sort -V | tail -n 1)
          if [ -z "$APKSIGNER_PATH" ]; then
            echo "Error: Failed to locate apksigner inside $ANDROID_HOME!"
            exit 1
          fi
          echo "Found apksigner at: $APKSIGNER_PATH"

          echo "Signing the compile debug APK output..."
          $APKSIGNER_PATH sign \
            --ks auto-release.jks \
            --ks-key-alias novel_alias \
            --ks-pass pass:novel_secure_password_2026 \
            --key-pass pass:novel_secure_password_2026 \
            --out android/app/build/outputs/apk/debug/app-signed.apk \
            android/app/build/outputs/apk/debug/app-debug.apk

          echo "Verifying APK signature layout..."
          $APKSIGNER_PATH verify android/app/build/outputs/apk/debug/app-signed.apk

      # 9. 创建并发布 Release，上传完美签名版 APK 产物
      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            android/app/build/outputs/apk/debug/app-signed.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
